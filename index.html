<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EPUB Cleaner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–ink: #1a1410;
–paper: #f5f0e8;
–cream: #ede7d9;
–accent: #8b3a2a;
–mid: #7a6e62;
–border: #c8bfb0;
–shadow: rgba(26,20,16,0.12);
}

body {
background: var(–paper);
color: var(–ink);
font-family: ‘Lora’, Georgia, serif;
-webkit-text-size-adjust: 100%;
}

/* ── Upload screen ── */
#uploadScreen {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100svh;
padding: 24px 16px 40px;
}

.card {
width: 100%;
max-width: 420px;
background: #fff;
border: 1.5px solid var(–border);
border-radius: 4px;
box-shadow: 0 2px 0 var(–border), 0 6px 32px var(–shadow);
overflow: hidden;
}

.card-header {
background: var(–ink);
color: var(–paper);
padding: 28px 28px 24px;
position: relative;
}

.card-header::after {
content: ‘’;
position: absolute;
bottom: 0; left: 0; right: 0;
height: 3px;
background: repeating-linear-gradient(90deg, var(–accent) 0, var(–accent) 8px, transparent 8px, transparent 14px);
}

.eyebrow {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.18em;
text-transform: uppercase;
color: var(–border);
margin-bottom: 8px;
}

h1 { font-size: 26px; font-weight: 600; line-height: 1.15; }
h1 em { font-style: italic; color: #c8a882; }

.subtitle {
margin-top: 8px;
font-size: 13px;
color: var(–border);
font-style: italic;
line-height: 1.5;
}

.card-body { padding: 28px; }

.drop-zone {
border: 2px dashed var(–border);
border-radius: 3px;
padding: 36px 20px;
text-align: center;
cursor: pointer;
transition: border-color 0.2s, background 0.2s;
position: relative;
-webkit-tap-highlight-color: transparent;
user-select: none;
}

.drop-zone:hover { border-color: var(–accent); background: #fdf8f4; }

.drop-zone input[type=“file”] {
position: absolute;
inset: 0;
opacity: 0;
cursor: pointer;
font-size: 16px;
width: 100%;
height: 100%;
}

.drop-icon { font-size: 40px; line-height: 1; margin-bottom: 12px; }
.drop-primary { font-size: 15px; font-weight: 600; color: var(–ink); margin-bottom: 4px; }
.drop-secondary { font-size: 12px; color: var(–mid); font-style: italic; }

.progress-bar {
margin-top: 20px;
height: 3px;
background: var(–cream);
border-radius: 2px;
overflow: hidden;
display: none;
}
.progress-bar.visible { display: block; }
.progress-fill {
height: 100%;
background: var(–accent);
width: 0%;
transition: width 0.3s ease;
}

.status {
margin-top: 12px;
font-size: 12px;
font-style: italic;
color: var(–mid);
text-align: center;
font-family: ‘DM Mono’, monospace;
min-height: 18px;
}
.status.error { color: var(–accent); }

.card-footer {
padding: 12px 28px;
border-top: 1px solid var(–cream);
font-size: 11px;
color: var(–mid);
font-style: italic;
text-align: center;
}

/* ── Book screen ── */
#bookScreen { display: none; }

#bookToolbar {
position: sticky;
top: 0;
z-index: 100;
background: var(–ink);
color: var(–paper);
padding: 10px 16px;
display: flex;
align-items: center;
gap: 12px;
}

#bookTitle {
flex: 1;
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 0.08em;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
opacity: 0.7;
}

#btnNewFile {
background: none;
border: 1px solid rgba(255,255,255,0.25);
border-radius: 3px;
color: var(–paper);
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 0.08em;
text-transform: uppercase;
padding: 5px 10px;
cursor: pointer;
flex-shrink: 0;
-webkit-tap-highlight-color: transparent;
}

#bookContent {
max-width: 680px;
margin: 0 auto;
padding: 32px 20px 80px;
}

/* Render the EPUB’s own HTML inside #bookContent,
but sanitise away scripts/styles and fix image paths */
#bookContent h1,
#bookContent h2,
#bookContent h3,
#bookContent h4 {
font-family: ‘Lora’, Georgia, serif;
font-weight: 600;
line-height: 1.25;
margin: 2em 0 0.6em;
color: var(–ink);
}

#bookContent h1 { font-size: 1.7em; }
#bookContent h2 { font-size: 1.35em; }
#bookContent h3 { font-size: 1.15em; }

#bookContent p {
font-size: 1.08em;
line-height: 1.75;
margin: 0 0 0.9em;
}

#bookContent em, #bookContent i { font-style: italic; }
#bookContent strong, #bookContent b { font-weight: 600; }

#bookContent hr {
border: none;
border-top: 1px solid var(–border);
margin: 2em 0;
}

#bookContent img { max-width: 100%; height: auto; display: block; margin: 1em auto; }

/* Chapter divider between spine items */
.chapter-break {
border: none;
border-top: 2px solid var(–border);
margin: 3em 0;
position: relative;
}
</style>

</head>
<body>

<!-- ── Upload screen ── -->

<div id="uploadScreen">
  <div class="card">
    <div class="card-header">
      <div class="eyebrow">Typography Tool</div>
      <h1>EPUB <em>Cleaner</em></h1>
      <p class="subtitle">Loads your EPUB as a readable page with « » replacements applied — ready to share into ElevenReader.</p>
    </div>
    <div class="card-body">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".epub">
        <div class="drop-icon">📖</div>
        <div class="drop-primary">Choose an EPUB file</div>
        <div class="drop-secondary">tap to browse</div>
      </div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status" id="status"></div>
    </div>
    <div class="card-footer">All processing happens locally — nothing is uploaded.</div>
  </div>
</div>

<!-- ── Book screen ── -->

<div id="bookScreen">
  <div id="bookToolbar">
    <span id="bookTitle"></span>
    <button id="btnNewFile">← New file</button>
  </div>
  <div id="bookContent"></div>
</div>

<script>
(function () {
  'use strict';

  var fileInput    = document.getElementById('fileInput');
  var dropZone     = document.getElementById('dropZone');
  var progressBar  = document.getElementById('progressBar');
  var progressFill = document.getElementById('progressFill');
  var statusEl     = document.getElementById('status');
  var uploadScreen = document.getElementById('uploadScreen');
  var bookScreen   = document.getElementById('bookScreen');
  var bookTitle    = document.getElementById('bookTitle');
  var bookContent  = document.getElementById('bookContent');
  var btnNewFile   = document.getElementById('btnNewFile');

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  function setProgress(pct) {
    progressFill.style.width = pct + '%';
  }

  fileInput.addEventListener('change', function () {
    if (this.files && this.files[0]) processEpub(this.files[0]);
  });

  dropZone.addEventListener('dragover', function (e) { e.preventDefault(); });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault();
    var file = e.dataTransfer && e.dataTransfer.files[0];
    if (file) processEpub(file);
  });

  btnNewFile.addEventListener('click', function () {
    bookScreen.style.display = 'none';
    uploadScreen.style.display = 'flex';
    bookContent.innerHTML = '';
    fileInput.value = '';
    setProgress(0);
    setStatus('');
    progressBar.classList.remove('visible');
  });

  function clean(text) {
    return text.replace(/<</g, '\u00ab').replace(/>>/g, '\u00bb');
  }

  function processEpub(file) {
    if (!file.name.toLowerCase().endsWith('.epub')) {
      setStatus('Please select a valid .epub file.', 'error');
      return;
    }

    progressBar.classList.add('visible');
    setProgress(5);
    setStatus('Reading file…');

    readAsArrayBuffer(file).then(function (buf) {
      setProgress(15);
      setStatus('Unzipping…');
      return JSZip.loadAsync(buf);

    }).then(function (zip) {
      setProgress(30);
      setStatus('Parsing EPUB…');

      // 1. Find and parse container.xml to get OPF path
      return zip.file('META-INF/container.xml').async('string').then(function (containerXml) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(containerXml, 'application/xml');
        var rootfile = doc.querySelector('rootfile');
        var opfPath = rootfile ? rootfile.getAttribute('full-path') : null;
        if (!opfPath) throw new Error('Could not find OPF file.');
        return { zip: zip, opfPath: opfPath };
      });

    }).then(function (ctx) {
      var zip = ctx.zip;
      var opfPath = ctx.opfPath;
      var opfDir  = opfPath.indexOf('/') !== -1 ? opfPath.substring(0, opfPath.lastIndexOf('/') + 1) : '';

      return zip.file(opfPath).async('string').then(function (opfXml) {
        setProgress(40);
        var parser = new DOMParser();
        var opf    = parser.parseFromString(opfXml, 'application/xml');

        // Build id→href map from manifest
        var manifestItems = {};
        opf.querySelectorAll('manifest item').forEach(function (item) {
          manifestItems[item.getAttribute('id')] = {
            href: item.getAttribute('href'),
            type: item.getAttribute('media-type')
          };
        });

        // Get spine order
        var spineRefs = [];
        opf.querySelectorAll('spine itemref').forEach(function (ref) {
          var id = ref.getAttribute('idref');
          if (manifestItems[id]) spineRefs.push(manifestItems[id].href);
        });

        // Get book title
        var titleEl = opf.querySelector('metadata title, title');
        var bookTitleText = titleEl ? titleEl.textContent.trim() : file.name.replace(/\.epub$/i, '');

        return { zip: zip, opfDir: opfDir, spineRefs: spineRefs, title: bookTitleText };
      });

    }).then(function (ctx) {
      var zip       = ctx.zip;
      var opfDir    = ctx.opfDir;
      var spineRefs = ctx.spineRefs;

      setStatus('Loading chapters…');

      // Load all spine HTML files in order
      var chain = Promise.resolve([]);
      spineRefs.forEach(function (href, i) {
        chain = chain.then(function (htmlChunks) {
          var fullPath = opfDir + href;
          // Normalise path (handle ../)
          fullPath = normalisePath(fullPath);
          var zipFile = zip.file(fullPath) || zip.file(href);
          if (!zipFile) return htmlChunks;

          return zipFile.async('string').then(function (html) {
            setProgress(40 + Math.round(((i + 1) / spineRefs.length) * 55));

            // Apply replacements
            html = clean(html);

            // Parse and extract body content
            var parser  = new DOMParser();
            var doc     = parser.parseFromString(html, 'text/html');
            var body    = doc.body;

            // Remove script tags
            body.querySelectorAll('script').forEach(function (el) { el.remove(); });
            // Remove style tags (we apply our own)
            body.querySelectorAll('style').forEach(function (el) { el.remove(); });
            // Remove link tags
            body.querySelectorAll('link').forEach(function (el) { el.remove(); });

            htmlChunks.push(body.innerHTML);
            return htmlChunks;
          });
        });
      });

      return chain.then(function (chunks) {
        return { chunks: chunks, title: ctx.title };
      });

    }).then(function (result) {
      setProgress(100);

      // Render
      bookTitle.textContent = result.title;
      bookContent.innerHTML = result.chunks.map(function (chunk, i) {
        return (i > 0 ? '<hr class="chapter-break">' : '') + chunk;
      }).join('');

      // Show book screen
      uploadScreen.style.display = 'none';
      bookScreen.style.display = 'block';
      window.scrollTo(0, 0);

    }).catch(function (err) {
      console.error(err);
      setStatus('Error: ' + (err.message || 'Something went wrong.'), 'error');
      setProgress(0);
    });
  }

  function normalisePath(path) {
    var parts = path.split('/');
    var result = [];
    parts.forEach(function (p) {
      if (p === '..') { result.pop(); }
      else if (p !== '.') { result.push(p); }
    });
    return result.join('/');
  }

  function readAsArrayBuffer(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload  = function (e) { resolve(e.target.result); };
      reader.onerror = function ()  { reject(new Error('Could not read file.')); };
      reader.readAsArrayBuffer(file);
    });
  }

})();
</script>

</body>
</html>
